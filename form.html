<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <!--action is used to what action should happen after form submission-->
    <form action="chessboard.html" >
        <fieldset><legend>Registration form</legend>
        <label>Name:</label>
        <!--label=to mention the text  -->
        <!--input: to take inputs from user-->
        <input type="text" placeholder="Enter your name"  required>
        <br><br>
        <label>Email:</label>
        <input type="email" placeholder="Enter your email" required>
        <br><br>
        <label>Contact:</label>
        <input type="tel" placeholder="Enter your contact no" required>
        <br><br>
        <label>Password:</label>
        <input type="password" placeholder="Set your password" required>
        <br><br>
        <label>Gender:</label>
        <!--select:is used for drop down -->
        <select>
            <option>Gender</option>
            <option>Female</option>
            <option>Male</option>
            
        </select>
        <br><br>
        <label>Gender:</label>
        <!--radio buttton used to seect single option from multiple option and name attribute is used to make only single selection possible-->
        <input type="radio" id="male" name="Gender">Male
        <input type="radio" id="female" name="Gender">Female
        <br><br>

        <!--Check Box: USed to select multiple options-->
        <label>Course:</label>
        <input type="checkbox">Web Designing
        
        <input type="checkbox">Data Analysis
        
        <input type="checkbox">Data Science
        
        <input type="checkbox">Java Fullstack
        

        <!--textarea : is used for larger text box whose size we can modify-->
        <label>Address:</label>
        <textarea cols="20" rows="5"></textarea>
        <br><br>

        <button type="button"  >Submit</button>
        
        </fieldset>
        
        


    </form>
</body>
</html>
