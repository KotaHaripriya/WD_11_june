<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
</head>
<body>
    <form style="background-color: rgb(140, 141, 218);">
        <fieldset>
        <h1 style="text-align: center;"><u>Student Registration Form</u></h1>
        <fieldset><legend><h3>Student Information</h3></legend>
        <label>Enter Your Name:</label><br>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Middle Name">
        <input type="text" placeholder="Last Name">
        <br><br>
        <label>Student_id:</label>
        <input type="text" placeholder="Enter your id">
        <br><br>
        <label>Date of Birth:</label>
        <input type="date">
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <br>
        </fieldset>
        <fieldset><legend><h3>Contact Details</h3></legend>
        <label>Email_id:</label>
        <input type="email" placeholder="Enter your email">
        <br><br>
        <label>Contact:</label>
        <input type="tel" placeholder="Enter your contact">
        <br><br>

        </fieldset>
        <fieldset>
            <legend><h3>Address</h3></legend>
            
            <label>Enter your address:</label>
            <br><br>
            <input type="text" placeholder="Street Address" size="150">
            <br><br>
            
            <input type="text" placeholder="City" >
            <input type="text" placeholder="State/Province">
            <br><br>
            <input type="text" placeholder="Country">
            <input type="number" placeholder="ZIP Code">


        </fieldset>
        <fieldset>
            <legend><h3>Course Details</h3></legend>
            <label>Graduation Course</label>
            <select name="Graduation">
                <option></option>
                <option>B.Sc</option>
                <option>BCA</option>
                <option>Btech</option>
                <option>BCom</option>
                <option>BA</option>
                <option>other</option>
                   
            </select><br><br>
            <label>Select Graduation year</label>
            <select>
                <option></option>
                <option value="">2025</option>
                <option value="">2026</option>
                <option value="">2027</option>
            </select>


        </fieldset>
        <fieldset>
            <legend><h3>Student Photo</h3></legend>
            <label for="photo">Add Passport Size Photo: </label><br><br>
            <input type="file" accept="image/*">


            
        </fieldset>
        <fieldset>
            <legend><h3>declaration</h3></legend>
            <input type="checkbox" id="declaration" required>
            <label for="declaration">
                I hereby declare that all the information furnished by me in this registration form is true and correct to the best of my knowledge and belief
            </label>
            
        </fieldset>
        <br><br>
        <div style="text-align:center;">
            <input type="submit" value="submit" style="font-size: x-large; background-color: blue;">
        </div>


    </form>
    
    
</body>
</html>
